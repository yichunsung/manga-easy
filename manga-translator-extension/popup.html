<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫畫翻譯</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>漫畫翻譯</h1>
      <button id="start-selection" type="button">
        <span class="menu-number">1</span>
        <span>框選翻譯</span>
      </button>
      <button id="clear-results" type="button">
        <span class="menu-number">2</span>
        <span>一鍵清除所有翻譯結果</span>
      </button>
      <button id="toggle-floating-button" type="button">
        <span class="menu-number">3</span>
        <span id="floating-button-label">啟用常駐框選按鈕</span>
      </button>
      <p id="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
